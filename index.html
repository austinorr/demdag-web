<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEMDAG</title>
    <script type="module" src="./src/index.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      #area-units,
      button {
        font-family: sans-serif;
      }
      #area-units div {
        margin: 0em 0.25em;
        width: 6ch;
        display: flex;
        border-radius: 0.5em;
      }
      #area-units div:not(input:checked) {
        border: 2px solid rgba(255, 255, 255, 255);
        background-color: rgb(228, 228, 228);
        font-weight: bold;
      }
      #area-units div:has(input:checked),
      #cycleSnap:not(.mode-none) {
        background-color: rgb(110, 180, 255);
        font-weight: bold;
        border: 2px solid;
        border-color: rgb(110, 180, 255);
      }
      #snapMode {
        font-size: x-small;
      }
      #area-units input {
        display: none;
      }
      #area-units label {
        padding: 0.25em 0.25em;
        text-align: center;
        width: 100%;
        font-size: small;
      }
      #nav-zoom button {
        border-radius: 0.5em;
        margin: 2px;
      }
      #nav-zoom > button {
        margin: 3px;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      "
    >
      <div style="text-align: center">
        Hover over the image (or touch) to see the complete watershed
        delineation upstream of each pixel.<br />On mobile devices, use two
        fingers to pan.
        <span
          id="fps-container"
          style="
            margin-left: 0.5em;
            font-family: monospace;
            font-size: small;
            align-self: center;
            display: none;
          "
          ><span id="fps">-</span> fps</span
        >
      </div>
      <div id="nav-zoom" style="display: flex; margin-top: 1rem">
        <button onclick="main('sm')">Mini Map</button>
        <button onclick="main('lg')">St. Helens</button>
        <button onclick="main('slippy-conn')">Slippy-Conn</button>
        <button
          style="
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0);
            border: none;
          "
        >
          Zoom:&nbsp;<span
            id="zoom"
            style="width: 3ch; font-weight: bold"
          ></span>
        </button>
        <div
          id="zoom-buttons"
          style="display: flex; flex-direction: column; justify-content: center"
        >
          <button onclick="adjustZoom(1)" style="width: 5ch">+</button>
          <button onclick="adjustZoom(-1)" style="width: 5ch">-</button>
        </div>
        <button id="cycleSnap">Snap<br /><span id="snapMode"></span></button>
      </div>
      <div id="area-units" style="display: flex; margin: 1rem 0 1rem 0"></div>
      <div
        id="area-summary"
        style="
          position: fixed;
          pointer-events: none;
          background-color: rgba(255, 255, 255, 0.6);
          padding: 0.2em;
          border-radius: 0.25em;
          font-size: 8pt;
        "
      >
        <table>
          <tr id="area_row">
            <td style="text-align: right">Area:</td>
            <td><span id="area_value"></span></td>
          </tr>
        </table>
      </div>
      <div id="canvas-container" style="display: flex; width: 100%">
        <div style="margin: auto">
          <canvas id="canvas"></canvas>
        </div>
      </div>
      <div id="map-container" style="display: none; width: calc(100% - 1rem); flex: 1; min-height: 0; margin: 0 0.5rem 0.5rem"></div>
    </div>
  </body>
</html>
